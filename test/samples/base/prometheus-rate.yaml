apiVersion: v1
kind: Namespace
metadata:
  name: sample-prometheus-rate
  labels:
    sample: prometheus-rate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-rate
  namespace: sample-prometheus-rate
  labels:
    sample: prometheus-rate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-rate
  template:
    metadata:
      labels:
        app: prometheus-rate
    spec:
      containers:
        - name: sample-app
          image: xas-sample:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-rate
  namespace: sample-prometheus-rate
  labels:
    sample: prometheus-rate
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: prometheus-rate
---
apiVersion: xas.io/v1
kind: ScalingPolicy
metadata:
  name: prometheus-rate
  namespace: sample-prometheus-rate
  labels:
    sample: prometheus-rate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prometheus-rate
  minReplicas: 1
  maxReplicas: 10
  
  metrics:
    - name: "qps"
      provider: "prometheus"
      params:
        metric: "http_requests_total"
      rate:
        window: "1m"
        aggregation: "Sum" # Total QPS across all pods
      
  scaling:
    - recommender: "linear"
      name: "qps_target"
      params:
        metric: "qps"
        target: "10.0" # Scale to maintain 10 QPS per pod
        mode: "Active"
