apiVersion: v1
kind: Namespace
metadata:
  name: sample-kubelet-cpu
  labels:
    sample: kubelet-cpu
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubelet-cpu
  namespace: sample-kubelet-cpu
  labels:
    sample: kubelet-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubelet-cpu
  template:
    metadata:
      labels:
        app: kubelet-cpu
    spec:
      containers:
        - name: stress
          image: vish/stress
          imagePullPolicy: IfNotPresent
          args: ["-cpus", "1"]
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "300m"
---
apiVersion: xas.io/v1
kind: ScalingPolicy
metadata:
  name: kubelet-cpu
  namespace: sample-kubelet-cpu
  labels:
    sample: kubelet-cpu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kubelet-cpu
  minReplicas: 1
  maxReplicas: 10
  
  metrics:
    - name: "cpu_utilization"
      provider: "kubelet"
      params:
        type: "cpu"
        mode: "utilization"
      gauge:
        aggregation: "Avg"

  scaling:
    - recommender: "linear"
      name: "cpu_target"
      params:
        metric: "cpu_utilization"
        target: "0.5" 
