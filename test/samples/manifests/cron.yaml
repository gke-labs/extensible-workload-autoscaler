apiVersion: v1
kind: Namespace
metadata:
  name: sample-cron
  labels:
    sample: cron
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cron
  namespace: sample-cron
  labels:
    sample: cron
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cron
  template:
    metadata:
      labels:
        app: cron
    spec:
      containers:
        - name: app
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
---
apiVersion: xas.io/v1
kind: ScalingPolicy
metadata:
  name: cron-policy
  namespace: sample-cron
  labels:
    sample: cron
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cron
  minReplicas: 0
  maxReplicas: 10
  metrics: []

  scaling:
    - recommender: cron
      name: schedule-gate
      params:
        start: "*/2 * * * *"
        end: "1-59/2 * * * *"
        timezone: "UTC"
        replicas: "2"
